# Crimson override: two RTX 3090s (Ampere sm_86), so the Ada-only fp8 squeeze is undone.
#
# On the 4090 the three model services co-reside on one 24 GB card only because the embedder and
# reranker are runtime-quantized to fp8 (`--quantization fp8` over bf16 checkpoints), an Ada/Hopper
# (sm >= 8.9) hardware path. Ampere has no fp8 compute; vLLM would fall back to weight-only
# fp8-Marlin, a pointless risk when crimson has 48 GB across two cards. This override serves both
# at plain bf16 (2B embedder ~4.5 GB, 4B reranker ~9 GB) pinned together on GPU 0, and gives the
# extraction LLM GPU 1 to itself. The extractor's w4a16 compressed-tensors checkpoint runs on
# Ampere unchanged (Marlin int4 is sm80+), as does the fp8 KV cache (storage-only, no fp8 matmul).
#
# GPU 1 hosting the extractor alone leaves ~18 GB of headroom: the standing quality lever is to
# swap AIZK_LLM_CHECKPOINT for a larger extractor (E4B/9B class) in crimson's .env, since
# extraction quality is the fact-noise bottleneck of the graph.
#
# Usage: docker compose -f deploy/docker-compose.yml -f deploy/docker-compose.crimson.yml up -d

services:
  vllm-emb:
    command:
      - "--model"
      - "${AIZK_EMBED_CHECKPOINT:-Qwen/Qwen3-VL-Embedding-2B}"
      - "--runner"
      - "pooling"
      - "--gpu-memory-utilization"
      - "${AIZK_EMBED_GPU_MEM_UTIL:-0.35}"
      - "--max-model-len"
      - "${AIZK_EMBED_MAX_MODEL_LEN:-8192}"
      - "--served-model-name"
      - "${AIZK_EMBED_MODEL:-qwen3-vl-emb}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - '{"is_matryoshka": true}'
    deploy:
      resources:
        reservations:
          devices: !override
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  vllm-rerank:
    command:
      - "--model"
      - "${AIZK_RERANK_MODEL:-Qwen/Qwen3-Reranker-4B}"
      - "--runner"
      - "pooling"
      - "--gpu-memory-utilization"
      - "${AIZK_RERANK_GPU_MEM_UTIL:-0.55}"
      - "--max-model-len"
      - "${AIZK_RERANK_MAX_MODEL_LEN:-8192}"
      - "--served-model-name"
      - "${AIZK_RERANK_MODEL:-Qwen/Qwen3-Reranker-4B}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - >-
        {"architectures": ["Qwen3ForSequenceClassification"],
        "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}
      - "--chat-template"
      - "examples/pooling/score/template/qwen3_reranker.jinja"
    deploy:
      resources:
        reservations:
          devices: !override
            - driver: nvidia
              device_ids: ["0"]
              capabilities: [gpu]

  vllm-llm:
    deploy:
      resources:
        reservations:
          devices: !override
            - driver: nvidia
              device_ids: ["1"]
              capabilities: [gpu]

  # The Cloudflare Tunnel connector, the outbound-only path through the university NAT that
  # publishes the MCP endpoint without opening a port. It joins the compose network and points
  # at the server by service name, so nothing extra is published on the host. The token comes
  # from AIZK_TUNNEL_TOKEN in .env (Zero Trust -> Networks -> Tunnels -> create -> token); the
  # tunnel's public-hostname ingress maps the public URL onto http://server:8080 (MCP at /mcp).
  cloudflared:
    image: cloudflare/cloudflared:latest
    command: tunnel --no-autoupdate run --token ${AIZK_TUNNEL_TOKEN:-}
    profiles: ["public"]  # opt-in: `--profile public` once the tunnel token exists, so a bare bring-up never blocks on it
    depends_on:
      - server
    restart: unless-stopped

  # Logto, the self-hosted OIDC provider we are moving to as aizk's identity plane, replacing
  # Zitadel. Shares the one Postgres in the db container through its own `logto` database (created
  # host-side by a one-off `CREATE DATABASE logto`, then seeded by Logto on first boot). It runs
  # alongside Zitadel for now; the cutover just rewires the aizk server's `AIZK_OIDC_*` settings to
  # point here. The admin console (ADMIN_ENDPOINT, published on 3002) is where you create the first
  # admin user and add the GitHub social connector; the auth endpoint (ENDPOINT, published on 3001)
  # is what browsers and the aizk server hit. Both default to localhost so an SSH tunnel reaches
  # them; set AIZK_LOGTO_ENDPOINT / AIZK_LOGTO_ADMIN_ENDPOINT to public URLs once a Cloudflare
  # hostname is wired. The entrypoint seeds on first run and no-ops the seed on later restarts.
  logto:
    image: svhd/logto:latest
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npm run cli db seed -- --swe || true; exec npm start"]
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://aizk_admin:${AIZK_ADMIN_PASSWORD:-aizk}@db:5432/logto
      - ENDPOINT=${AIZK_LOGTO_ENDPOINT:-http://localhost:3001}
      - ADMIN_ENDPOINT=${AIZK_LOGTO_ADMIN_ENDPOINT:-http://localhost:3002}
    ports:
      - "${AIZK_LOGTO_PORT:-3001}:3001"
      - "${AIZK_LOGTO_ADMIN_PORT:-3002}:3002"
    restart: unless-stopped

  # Both env_file consumers read the crimson-canonical env under ~/.aizk, outside the synced tree,
  # so a lote re-sync of the repo can never clobber host-local values (GPU splits, model swaps, the
  # tunnel token). The compose interpolation side is the same file via `--env-file` on the command
  # line. `~/.aizk` is the single home for this deployment's config, backups, and logs.
  db:
    env_file: !override
      - path: /home/crimson/.aizk/.env
        required: true

  server:
    env_file: !override
      - path: /home/crimson/.aizk/.env
        required: true
    # backups land on the host under ~/.aizk/backups (the nightly BackupTask writes /backups),
    # replacing the anonymous `backups` named volume so every dump lives beside the rest of the
    # deployment state and the off-box mirror in `scripts/pull-aizk-backup.sh` reads it unchanged.
    volumes: !override
      - /home/crimson/.aizk/backups:/backups
      # the GLiNER2 gate's checkpoint cache on the host, so the 205M model downloads once and every
      # later start resolves it offline through `snapshot_download(local_files_only=True)` rather
      # than blocking startup on an implicit HF Hub fetch. Pointed at by HF_HOME=/hf-cache in the
      # host `.env`.
      - /home/crimson/.aizk/hf-cache:/hf-cache
