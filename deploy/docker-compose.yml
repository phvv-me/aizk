# Pin the project name so it stays `aizk` regardless of the compose file living under deploy/.
# Compose otherwise derives the project from the first -f file's directory (deploy/), which would
# orphan the existing aizk-* containers and the aizk_db-data volume onto a new `deploy` project.
name: aizk

services:
  db:
    image: tensorchord/vchord-suite:pg18-latest
    # the compose-level ${VAR:-default} substitutions below are filled from the project's own
    # .env (compose auto-loads it from this file's directory, no env_file needed for these), the
    # single file `.env.example` documents field for field alongside `config/settings.py`'s own
    # defaults, so a password or port changed once here is the same edit `Settings` picks up.
    environment:
      # POSTGRES_USER stays the fixed "aizk_admin" literal, not a var: it is the owning role every
      # migration and `initdb/roles.sh` connects as, and `Settings.admin_database_url` hardcodes
      # the same literal role name, only the password travels through the environment.
      POSTGRES_USER: aizk_admin
      POSTGRES_PASSWORD: ${AIZK_ADMIN_PASSWORD:-aizk}
      POSTGRES_DB: ${AIZK_DB_NAME:-aizk}
    # unlike the interpolations above, which compose resolves on the host before the container
    # ever starts, `roles.sh` runs its own shell inside the container and needs AIZK_APP_PASSWORD
    # as a real environment variable there to read; env_file passes the whole .env through as
    # container env for exactly that, `required: false` so a checkout with no .env yet (only the
    # committed .env.example) still starts clean on every field's own default.
    env_file:
      - path: .env
        required: false
    ports:
      - "${AIZK_DB_PORT:-5433}:5432"
    # the image's own CMD (`docker inspect tensorchord/vchord-suite:pg18-latest`) already carries
    # shared_preload_libraries and search_path, and a compose `command:` replaces CMD outright
    # rather than appending to it, so both are repeated here verbatim alongside the request GUC.
    # User is the only request context and Pydantic serializes `User.scopes` into `app.scopes`.
    # The empty server default stays fail closed before a session binds User.
    command:
      - postgres
      - -c
      # pg_stat_statements rides alongside the vchord suite's own libraries so every profiling
      # wave's Postgres-side query stats (Phase 2's build-slice and recall measurements) come
      # from the catalog view rather than an ad-hoc EXPLAIN ANALYZE per query; loading a shared
      # library only ever takes effect on the next Postgres start, `ops.setup`'s own
      # `CREATE EXTENSION IF NOT EXISTS pg_stat_statements` is the idempotent other half that
      # makes the view queryable once this restart has happened.
      - shared_preload_libraries=vchord,vchord_bm25,vector,pg_tokenizer,pg_stat_statements
      - -c
      - search_path="$$user", public, bm25_catalog, tokenizer_catalog
      - -c
      - app.scopes=
    volumes:
      # pg18+ images store data under a major-version-specific subdirectory (pg_ctlcluster-style),
      # so the mount point is the parent dir now, not .../data directly
      - db-data:/var/lib/postgresql
      # runs once against a fresh volume, before any migration ever connects: creates the
      # restricted aizk_app role and its schema-wide default privileges, so 0001_init never has
      # to create the role itself. Postgres runs every /docker-entrypoint-initdb.d/ script exactly
      # once, only when the data directory is empty, so a `down -v && up` is required to re-run it.
      # A .sh script (not .sql) so it can read AIZK_APP_PASSWORD from its own container env rather
      # than hardcoding the role's password inline.
      - ./initdb/roles.sh:/docker-entrypoint-initdb.d/roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aizk_admin -d aizk"]
      interval: 5s
      timeout: 5s
      retries: 10

  # vLLM serves Qwen3-VL-Embedding-2B over an OpenAI-compatible /v1/embeddings, so the model loads
  # in this container, never inside aizk. --runner pooling is the current flag (--task embed was
  # removed), is_matryoshka lets a request set dimensions=1024 to truncate the native 2048-d output.
  # FP8 is the Ada 4090's native path, so the weights load quantized and leave room for the chat
  # model to co-reside on the same 24 GB card. Every
  # serving knob below is an .env var with an inline default, so flipping precision or model is an
  # .env edit and never a yaml one. Bound to localhost only because vLLM ships unauthenticated;
  # never expose it on a public address. AIZK_EMBED_CHECKPOINT (the HF weights to load) and
  # AIZK_EMBED_MODEL (the served alias `config/settings.py`'s embed_model must match) are two
  # different vars on purpose, since the checkpoint path is not a usable served name.
  vllm-emb:
    image: vllm/vllm-openai:v0.24.0
    command:
      - "--model"
      - "${AIZK_EMBED_CHECKPOINT:-Qwen/Qwen3-VL-Embedding-2B}"
      - "--runner"
      - "pooling"
      - "--quantization"
      - "${AIZK_EMBED_QUANTIZATION:-fp8}"
      - "--gpu-memory-utilization"
      - "${AIZK_EMBED_GPU_MEM_UTIL:-0.30}"
      # aizk chunks are 2048 chars (<=700 tokens), so a 2048 context is ample; the model's 262K
      # native length would size the KV cache at 28 GiB, and even 8192 was ~10x waste. At 2048 this
      # lane settles near 4.7 GiB and its throughput rises ~15% over the old 8192/0.30 sizing.
      - "--max-model-len"
      - "${AIZK_EMBED_MAX_MODEL_LEN:-2048}"
      # a pooling lane saturates on batch width, not KV depth, so an explicit cap matched to the
      # extractor's own concurrency keeps continuous batching full without over-reserving memory.
      - "--max-num-seqs"
      - "${AIZK_EMBED_MAX_NUM_SEQS:-64}"
      - "--served-model-name"
      - "${AIZK_EMBED_MODEL:-qwen3-vl-emb}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - '{"is_matryoshka": true}'
    ports:
      - "127.0.0.1:${AIZK_EMBED_PORT:-8000}:8000"
    # The two models share one 24 GB card, and vLLM sizes each one's cache against the memory
    # free at profiling time. Started all at once they profile concurrently, each reads the whole
    # card as free, and the sum over-commits it so one dies with "No available memory for the cache
    # blocks". The healthcheck plus the depends_on chain below serialize startup instead. The
    # embedder comes up first and the extractor profiles against the memory it already holds.
    # start_period covers the
    # minute-plus of weight loading before /health answers, during which a failing probe is not
    # counted against retries.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # vLLM serves the graph-extraction chat model over an OpenAI-compatible /v1/chat/completions,
  # the second co-resident model on the same 4090, reached by aizk's `structured` seam at llm_url.
  # A default-on service now, not an opt-in profile: extraction replaced Ollama with this
  # co-resident vLLM lane sized to fit beside the embedder on one 24 GB card. Model defaults to
  # Gemma 4 E2B (the Efficient series, 2.3B
  # effective, Apache 2.0), the official Google w4a16 QAT checkpoint in compressed-tensors format
  # (`google/gemma-4-E2B-it-qat-w4a16-ct`), ungated, day-0 vLLM support, JSON/function-calling
  # trained. E4B (`google/gemma-4-E4B-it-qat-w4a16-ct`) was the first choice but ruled out twice
  # over: its process footprint measured a fixed ~9.23 GiB against only ~9.59 GiB physically free
  # once the embedder and reranker hold their own share, a margin under 400 MiB that persisted
  # identically across five tuning attempts (gpu-memory-utilization 0.35/0.32/0.34, max-num-seqs
  # 48/16/12, with and without PYTORCH_CUDA_ALLOC_CONF=expandable_segments); and separately, even
  # standalone with the whole GPU to itself, E4B could not reliably answer the combined call's
  # strict-mode JSON schema at all on this vLLM version (v0.24.0) — every attempt (a trivial
  # one-sentence input included) ran to extract_max_tokens without ever emitting valid JSON,
  # while the identical call against E2B worked cleanly across 3000+ real chunks. E2B's 7.23 GiB
  # footprint fits with room to spare and its structured output was fully reliable throughout.
  # Qwen3.5-4B was ruled out earlier still: it ships no official GPTQ-Int4 at 4B, and its
  # Gated-DeltaNet hybrid architecture adds a fixed-size Mamba cache block per concurrent sequence
  # on top of the ordinary KV cache, which capped real concurrency near 12-13 sequences on this
  # shared card regardless of max-model-len; Gemma 4's local/global attention hybrid carries no
  # such extra per-sequence floor, so ordinary `--gpu-memory-utilization`/`--max-model-len` tuning
  # behaves predictably. vLLM auto-detects the compressed-tensors quant config from the
  # checkpoint, so AIZK_LLM_QUANTIZATION is still named explicitly, matching how every other
  # service here names its own quantization instead of relying on autodetection silently.
  # --enable-prefix-caching and --enable-chunked-prefill raise throughput under aizk's own
  # concurrent chunk load; --max-num-seqs matches settings.graph_build_concurrency so this
  # pipeline's own concurrency is what saturates vLLM's continuous batching, and structured output
  # already runs through vLLM's default xgrammar backend with no flag needed. Gemma 4 answers
  # directly with no thinking preamble unless a `<|think|>` token is placed in the system prompt,
  # the opposite default of Qwen3's hybrid-thinking models, so AIZK_LLM_CHAT_TEMPLATE_KWARGS stays
  # at its empty default, no extra_body needed to keep the combined call's output compact.
  # AIZK_LLM_CHECKPOINT/AIZK_LLM_MODEL split the same way as the embedder's, checkpoint path
  # versus served alias, and the alias must match `config/settings.py`'s own llm_model default.
  vllm-llm:
    image: vllm/vllm-openai:v0.24.0
    # PyTorch's own suggested fix for allocator fragmentation under a tight shared budget; kept
    # even though E2B has room to spare, since it cost nothing during the E4B tuning search and
    # buys headroom back for anyone who switches AIZK_LLM_CHECKPOINT to the larger model.
    environment:
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    command:
      - "--model"
      - "${AIZK_LLM_CHECKPOINT:-google/gemma-4-E2B-it-qat-w4a16-ct}"
      - "--quantization"
      - "${AIZK_LLM_QUANTIZATION:-compressed-tensors}"
      # 0.45 (10.8 GB) still clears E2B's measured 7.23 GiB footprint with margin and makes
      # room for the reranker's 0.20 share, keeping the three lanes inside one card.
      - "--gpu-memory-utilization"
      - "${AIZK_LLM_GPU_MEM_UTIL:-0.45}"
      - "--max-model-len"
      - "${AIZK_LLM_MAX_MODEL_LEN:-8192}"
      - "--max-num-seqs"
      - "${AIZK_LLM_MAX_NUM_SEQS:-48}"
      - "--kv-cache-dtype"
      - "${AIZK_LLM_KV_CACHE_DTYPE:-fp8}"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--served-model-name"
      - "${AIZK_LLM_MODEL:-gemma4-e2b-llm}"
      - "--trust-remote-code"
    ports:
      - "127.0.0.1:${AIZK_LLM_PORT:-8002}:8000"
    # Start after the embedder and the reranker so every model profiles against the memory
    # the earlier lanes already hold.
    depends_on:
      vllm-rerank:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # vLLM serves Qwen3-Reranker-4B over /v1/rerank, the cross-encoder second pass recall
  # uses to reorder its evidence lanes before packing. The hf-overrides block is the official
  # recipe that mounts the original Qwen3 reranker checkpoint as a sequence classifier scoring
  # yes/no token logits; score calibration additionally requires the official prompt scaffold,
  # which `config/settings.py`'s rerank templates apply client-side. The 4B is the measured
  # floor for this lane: on 253 real vault queries reranking the embedder's own top 8, the
  # 0.6B checkpoint DEGRADED ordering (MRR 0.90 to 0.77 even correctly templated) while the
  # 4B held it (0.90 to 0.91), so the small model is never a valid economy here. The
  # depends_on chain keeps the three models profiling one at a time on the shared 24 GB card.
  # AIZK_RERANK_CHECKPOINT/AIZK_RERANK_MODEL split the same way as the other lanes, weights
  # path versus served alias, and the alias must match `config/settings.py`'s rerank_model.
  vllm-rerank:
    image: vllm/vllm-openai:v0.24.0
    command:
      - "--model"
      - "${AIZK_RERANK_CHECKPOINT:-Qwen/Qwen3-Reranker-4B}"
      - "--runner"
      - "pooling"
      - "--quantization"
      - "${AIZK_RERANK_QUANTIZATION:-fp8}"
      - "--gpu-memory-utilization"
      - "${AIZK_RERANK_GPU_MEM_UTIL:-0.20}"
      - "--max-model-len"
      - "${AIZK_RERANK_MAX_MODEL_LEN:-2048}"
      - "--max-num-seqs"
      - "${AIZK_RERANK_MAX_NUM_SEQS:-32}"
      - "--served-model-name"
      - "${AIZK_RERANK_MODEL:-qwen3-reranker}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - '{"architectures": ["Qwen3ForSequenceClassification"], "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}'
    ports:
      - "127.0.0.1:${AIZK_RERANK_PORT:-8004}:8000"
    depends_on:
      vllm-emb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # The gliner sidecar serves the GLiNER2 gate (extraction gating, route classification,
  # query mentions) so the server process never imports torch. Its custom DeBERTa multitask
  # architecture has no vLLM serving path, so this is a plain torch FastAPI service from
  # services/gliner. The 205M model holds ~1.2 GB on the card, inside the margin the vLLM
  # utilization shares below leave free; GLINER_DEVICE=cpu moves it off the GPU entirely.
  gliner:
    build:
      context: ../services/gliner
    environment:
      GLINER_DEVICE: ${AIZK_GLINER_DEVICE:-cuda}
      GLINER_CHECKPOINT: ${AIZK_GLINER_CHECKPOINT:-fastino/gliner2-base-v1}
    ports:
      - "127.0.0.1:${AIZK_GLINER_PORT:-8006}:8000"
    depends_on:
      vllm-llm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.aizk/hf-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: ["gpu"]

  # the whole engine in one container: `serve-mcp` gathers the pgqueuer worker on its own event
  # loop (serve_with_worker defaults on), so this single service is the MCP server, the background
  # maintenance passes, and the scheduled auto-backup at once. Reaches the db and the model
  # containers by their compose service names, so the localhost defaults that serve host-run dev
  # are overridden here to the container-internal addresses, never edited in code.
  server:
    build:
      # context is the package root (parent of deploy/) so the build sees src/ and pyproject.toml;
      # the .dockerignore at that root still applies since it is resolved against the context
      context: ..
      dockerfile: deploy/Dockerfile
      # Patos and RLS are developed beside Aizk and may be newer than their PyPI releases.
      # BuildKit sends only those packages as extra contexts instead of the whole monorepo.
      additional_contexts:
        patos: ../../patos
        rls: ../../rls
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - path: .env
        required: false
    environment:
      # reach Postgres by service name on its own internal 5432, not the host-mapped 5433. The db
      # host and port are all that changes, admin_asyncpg_dsn (and so the backup connection) and
      # the app DSN both rebuild from them, so pg_client_launcher stays empty and pg_dump runs
      # right here against db:5432 with the image's own version-matched client.
      AIZK_DB_HOST: db
      AIZK_DB_PORT: "5432"
      # the three model containers, each listening on its own internal 8000
      AIZK_EMBED_URL: http://vllm-emb:8000/v1
      AIZK_LLM_URL: http://vllm-llm:8000/v1
      AIZK_RERANK_URL: http://vllm-rerank:8000/v1
      AIZK_GLINER_GATE_URL: http://gliner:8000
      # serve streamable HTTP on all interfaces inside the container, published below; a reverse
      # proxy or tunnel terminates TLS in front of it, see docs/operations.md
      AIZK_MCP_HOST: 0.0.0.0
      AIZK_MCP_PORT: "8080"
      # the integrated auto-backup, the scheduled BackupTask dumping to the mounted volume nightly
      AIZK_BACKUP_ENABLED: "1"
      AIZK_BACKUP_DIR: /backups
    ports:
      - "${AIZK_MCP_PUBLISH_PORT:-8080}:8080"
    volumes:
      - backups:/backups
    restart: unless-stopped

volumes:
  db-data:
  backups:
