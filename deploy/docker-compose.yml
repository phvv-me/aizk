# Pin the project name so it stays `aizk` regardless of the compose file living under deploy/.
# Compose otherwise derives the project from the first -f file's directory (deploy/), which would
# orphan the existing aizk-* containers and the aizk_db-data volume onto a new `deploy` project.
name: aizk

x-aizk-env: &aizk-env
  - path: ./logto.conf
    required: true
  - path: ../.env
    required: false
  - path: ${AIZK_SECRET_ENV_FILE:-${HOME}/.aizk/.env}
    required: false

x-aizk-runtime: &aizk-runtime
  image: aizk-runtime
  build:
    context: ..
    dockerfile: deploy/Dockerfile
    additional_contexts:
      patos: ../../patos
      rls: ../../rls
  env_file: *aizk-env
  environment: &aizk-runtime-environment
    AIZK_DB_HOST: db
    AIZK_DB_PORT: "5432"
    AIZK_EMBED_URL: http://vllm-emb:8000/v1
    AIZK_LLM_URL: http://vllm-llm:8000/v1
    AIZK_RERANK_URL: http://vllm-rerank:8000
    AIZK_GLINER_URL: http://gliner:8000
    AIZK_EMBED_MODEL: ${AIZK_EMBED_MODEL:-qwen3-vl-emb}
    AIZK_LLM_MODEL: ${AIZK_LLM_MODEL:-extractor}
    AIZK_LLM_EXTRACT_MAX_TOKENS: ${AIZK_LLM_EXTRACT_MAX_TOKENS:-1024}
    AIZK_LLM_RESPONSE_MAX_TOKENS: ${AIZK_LLM_RESPONSE_MAX_TOKENS:-512}
    AIZK_RERANK_MODEL: ${AIZK_RERANK_MODEL:-qwen3-reranker}
    AIZK_GRAPH_BUILD_CONCURRENCY: ${AIZK_GRAPH_BUILD_CONCURRENCY:-48}
    AIZK_QUEUE_BATCH_SIZE: ${AIZK_QUEUE_BATCH_SIZE:-64}
    AIZK_DISPLAY_TIMEZONE: ${AIZK_DISPLAY_TIMEZONE:-Asia/Tokyo}
  cap_drop: ["ALL"]
  security_opt: ["no-new-privileges:true"]
  read_only: true
  tmpfs:
    - /tmp:rw,noexec,nosuid,size=1g
  pids_limit: 512
  restart: unless-stopped

services:
  # Named volumes start owned by root. This one-shot service grants only the unprivileged Aizk
  # runtime user access to its two writable directories, then exits before any server starts.
  volume-init:
    <<: *aizk-runtime
    user: "0:0"
    cap_add: ["CHOWN", "DAC_READ_SEARCH", "FOWNER"]
    entrypoint: ["sh", "-c"]
    command:
      - >-
        install -d -o 10001 -g 10001 -m 0700 /oauth /backups
        && chown -R 10001:10001 /oauth /backups
        && chmod 0700 /oauth /backups
    env_file: []
    environment: {}
    volumes:
      - ${AIZK_BACKUP_VOLUME:-backups}:/backups
      - ${AIZK_OAUTH_VOLUME:-oauth}:/oauth
    restart: "no"

  db:
    image: tensorchord/vchord-suite:pg18-latest@sha256:c6e5e77a1180199f91b040b6e85c6d10b0ded6d49fb614dfd2e7272ffb91af08
    # The compose-level ${VAR:-default} substitutions below come from packages/aizk/.env through
    # the documented --env-file .env option. Compose anchors automatic discovery to this file's
    # deploy directory, so omitting that option would silently select these defaults instead.
    # The single deploy/.env.example documents the same fields as config/settings.py.
    environment:
      # POSTGRES_USER stays the fixed "aizk_admin" literal, not a var: it is the owning role every
      # migration and `initdb/roles.sh` connects as, and `Settings.admin_database_url` hardcodes
      # the same literal role name, only the password travels through the environment.
      POSTGRES_USER: aizk_admin
      POSTGRES_PASSWORD: ${AIZK_ADMIN_PASSWORD:?set AIZK_ADMIN_PASSWORD}
      POSTGRES_DB: ${AIZK_DB_NAME:-aizk}
      POSTGRES_INITDB_ARGS: --data-checksums
      AIZK_APP_PASSWORD: ${AIZK_APP_PASSWORD:?set AIZK_APP_PASSWORD}
      AIZK_LOGTO_DB_PASSWORD: ${AIZK_LOGTO_DB_PASSWORD:?set AIZK_LOGTO_DB_PASSWORD}
    # unlike the interpolations above, which compose resolves on the host before the container
    # ever starts, `roles.sh` runs its own shell inside the container and needs AIZK_APP_PASSWORD
    # as a real environment variable there to read; env_file passes the whole .env through as
    # container env for exactly that, `required: false` so a checkout with no .env yet (only the
    # committed .env.example) still starts clean on every field's own default.
    ports:
      - "127.0.0.1:${AIZK_DB_PORT:-5433}:5432"
    # the image's own CMD (`docker inspect tensorchord/vchord-suite:pg18-latest`) already carries
    # shared_preload_libraries and search_path, and a compose `command:` replaces CMD outright
    # rather than appending to it, so both are repeated here verbatim alongside the request GUC.
    # User is the only request context and Pydantic serializes `User.scopes` into `app.scopes`.
    # The empty server default stays fail closed before a session binds User.
    command:
      - postgres
      - -c
      # pg_stat_statements rides alongside the vchord suite's own libraries so every profiling
      # wave's Postgres-side query stats (Phase 2's build-slice and recall measurements) come
      # from the catalog view rather than an ad-hoc EXPLAIN ANALYZE per query; loading a shared
      # library only ever takes effect on the next Postgres start, `ops.setup`'s own
      # `CREATE EXTENSION IF NOT EXISTS pg_stat_statements` is the idempotent other half that
      # makes the view queryable once this restart has happened.
      - shared_preload_libraries=vchord,vchord_bm25,vector,pg_tokenizer,pg_stat_statements
      - -c
      - search_path="$$user", public, bm25_catalog, tokenizer_catalog
      - -c
      - app.scopes=
      - -c
      - shared_buffers=${AIZK_PG_SHARED_BUFFERS:-16GB}
      - -c
      - effective_cache_size=${AIZK_PG_EFFECTIVE_CACHE_SIZE:-128GB}
      - -c
      - work_mem=${AIZK_PG_WORK_MEM:-16MB}
      - -c
      - maintenance_work_mem=${AIZK_PG_MAINTENANCE_WORK_MEM:-2GB}
      - -c
      - effective_io_concurrency=${AIZK_PG_EFFECTIVE_IO_CONCURRENCY:-200}
      - -c
      - maintenance_io_concurrency=${AIZK_PG_MAINTENANCE_IO_CONCURRENCY:-200}
      - -c
      - random_page_cost=${AIZK_PG_RANDOM_PAGE_COST:-1.1}
      - -c
      - checkpoint_timeout=${AIZK_PG_CHECKPOINT_TIMEOUT:-15min}
      - -c
      - max_wal_size=${AIZK_PG_MAX_WAL_SIZE:-8GB}
      - -c
      - min_wal_size=${AIZK_PG_MIN_WAL_SIZE:-2GB}
      - -c
      - wal_compression=${AIZK_PG_WAL_COMPRESSION:-on}
      - -c
      - track_io_timing=${AIZK_PG_TRACK_IO_TIMING:-on}
      - -c
      - log_lock_waits=${AIZK_PG_LOG_LOCK_WAITS:-on}
      - -c
      - log_min_duration_statement=${AIZK_PG_LOG_MIN_DURATION_STATEMENT:-1000ms}
      - -c
      - autovacuum_vacuum_scale_factor=${AIZK_PG_AUTOVACUUM_VACUUM_SCALE_FACTOR:-0.05}
      - -c
      - autovacuum_analyze_scale_factor=${AIZK_PG_AUTOVACUUM_ANALYZE_SCALE_FACTOR:-0.02}
    volumes:
      # pg18+ images store data under a major-version-specific subdirectory (pg_ctlcluster-style),
      # so the mount point is the parent dir now, not .../data directly
      - ${AIZK_POSTGRES_DATA_VOLUME:-db-data}:/var/lib/postgresql
      # runs once against a fresh volume, before any migration ever connects: creates the
      # restricted aizk_app role and its schema-wide default privileges, so 0001_init never has
      # to create the role itself. Postgres runs every /docker-entrypoint-initdb.d/ script exactly
      # once, only when the data directory is empty, so a `down -v && up` is required to re-run it.
      # A .sh script (not .sql) so it can read AIZK_APP_PASSWORD from its own container env rather
      # than hardcoding the role's password inline.
      - ./initdb/roles.sh:/docker-entrypoint-initdb.d/roles.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aizk_admin -d ${AIZK_DB_NAME:-aizk}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # vLLM serves Qwen3-VL-Embedding-2B over an OpenAI-compatible /v1/embeddings, so the model loads
  # in this container, never inside aizk. --runner pooling is the current flag (--task embed was
  # removed), is_matryoshka lets a request set dimensions=1024 to truncate the native 2048-d output.
  # The default bf16 path works on Ada and Ampere GPUs. Every
  # serving knob below is an .env var with an inline default, so flipping precision or model is an
  # .env edit and never a yaml one. Bound to localhost only because vLLM ships unauthenticated;
  # never expose it on a public address. AIZK_EMBED_CHECKPOINT (the HF weights to load) and
  # AIZK_EMBED_MODEL (the served alias `config/settings.py`'s embed_model must match) are two
  # different vars on purpose, since the checkpoint path is not a usable served name.
  vllm-emb:
    image: vllm/vllm-openai:v0.24.0
    command:
      - "${AIZK_EMBED_CHECKPOINT:-Qwen/Qwen3-VL-Embedding-2B}"
      - "--runner"
      - "pooling"
      - "--gpu-memory-utilization"
      - "${AIZK_EMBED_GPU_MEM_UTIL:-0.30}"
      # aizk chunks are 2048 chars (<=700 tokens), so a 2048 context is ample; the model's 262K
      # native length would size the KV cache at 28 GiB, and even 8192 was ~10x waste. At 2048 this
      # lane settles near 4.7 GiB and its throughput rises ~15% over the old 8192/0.30 sizing.
      - "--max-model-len"
      - "${AIZK_EMBED_MAX_MODEL_LEN:-2048}"
      # a pooling lane saturates on batch width, not KV depth, so an explicit cap matched to the
      # extractor's own concurrency keeps continuous batching full without over-reserving memory.
      - "--max-num-seqs"
      - "${AIZK_EMBED_MAX_NUM_SEQS:-64}"
      - "--served-model-name"
      - "${AIZK_EMBED_MODEL:-qwen3-vl-emb}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - '{"is_matryoshka": true}'
    ports:
      - "127.0.0.1:${AIZK_EMBED_PORT:-8000}:8000"
    # The two models share one 24 GB card, and vLLM sizes each one's cache against the memory
    # free at profiling time. Started all at once they profile concurrently, each reads the whole
    # card as free, and the sum over-commits it so one dies with "No available memory for the cache
    # blocks". The healthcheck plus the depends_on chain below serialize startup instead. The
    # embedder comes up first and the extractor profiles against the memory it already holds.
    # start_period covers the
    # minute-plus of weight loading before /health answers, during which a failing probe is not
    # counted against retries.
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AIZK_EMBED_GPU_DEVICE:-0}"]
              capabilities: ["gpu"]

  # vLLM serves schema-constrained graph extraction. Every sizing knob stays in the shared env
  # file, which supports either a small co-resident model or a dedicated-GPU model with no second
  # Compose file. The served alias must match AIZK_LLM_MODEL.
  vllm-llm:
    image: vllm/vllm-openai:v0.24.0
    environment:
      HF_XET_HIGH_PERFORMANCE: "${AIZK_HF_XET_HIGH_PERFORMANCE:-0}"
      PYTORCH_CUDA_ALLOC_CONF: expandable_segments:True
    command:
      - "${AIZK_LLM_CHECKPOINT:-google/gemma-4-E2B-it-qat-w4a16-ct}"
      - "--quantization"
      - "${AIZK_LLM_QUANTIZATION:-compressed-tensors}"
      - "--gpu-memory-utilization"
      - "${AIZK_LLM_GPU_MEM_UTIL:-0.45}"
      - "--max-model-len"
      - "${AIZK_LLM_MAX_MODEL_LEN:-8192}"
      - "--max-num-seqs"
      - "${AIZK_LLM_MAX_NUM_SEQS:-48}"
      - "--kv-cache-dtype"
      - "${AIZK_LLM_KV_CACHE_DTYPE:-bfloat16}"
      - "--enable-prefix-caching"
      - "--enable-chunked-prefill"
      - "--served-model-name"
      - "${AIZK_LLM_MODEL:-extractor}"
      - "--trust-remote-code"
    ports:
      - "127.0.0.1:${AIZK_LLM_PORT:-8002}:8000"
    # Start after the embedder and the reranker so every model profiles against the memory
    # the earlier lanes already hold.
    depends_on:
      vllm-rerank:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AIZK_LLM_GPU_DEVICE:-0}"]
              capabilities: ["gpu"]

  # vLLM serves Qwen3-Reranker-4B over /v1/rerank, the cross-encoder second pass recall
  # uses to reorder its evidence lanes before packing. The hf-overrides block is the official
  # recipe that mounts the original Qwen3 reranker checkpoint as a sequence classifier scoring
  # yes/no token logits; score calibration additionally requires the official prompt scaffold,
  # which `config/settings.py`'s rerank templates apply client-side. The 4B is the measured
  # floor for this lane: on 253 real vault queries reranking the embedder's own top 8, the
  # 0.6B checkpoint DEGRADED ordering (MRR 0.90 to 0.77 even correctly templated) while the
  # 4B held it (0.90 to 0.91), so the small model is never a valid economy here. The
  # depends_on chain keeps the three models profiling one at a time on the shared 24 GB card.
  # AIZK_RERANK_CHECKPOINT/AIZK_RERANK_MODEL split the same way as the other lanes, weights
  # path versus served alias, and the alias must match `config/settings.py`'s rerank_model.
  vllm-rerank:
    image: vllm/vllm-openai:v0.24.0
    command:
      - "${AIZK_RERANK_CHECKPOINT:-Qwen/Qwen3-Reranker-4B}"
      - "--runner"
      - "pooling"
      - "--quantization"
      - "${AIZK_RERANK_QUANTIZATION:-fp8}"
      - "--gpu-memory-utilization"
      - "${AIZK_RERANK_GPU_MEM_UTIL:-0.25}"
      - "--max-model-len"
      - "${AIZK_RERANK_MAX_MODEL_LEN:-2048}"
      - "--max-num-seqs"
      - "${AIZK_RERANK_MAX_NUM_SEQS:-32}"
      - "--served-model-name"
      - "${AIZK_RERANK_MODEL:-qwen3-reranker}"
      - "--trust-remote-code"
      - "--hf-overrides"
      - '{"architectures": ["Qwen3ForSequenceClassification"], "classifier_from_token": ["no", "yes"], "is_original_qwen3_reranker": true}'
    ports:
      - "127.0.0.1:${AIZK_RERANK_PORT:-8004}:8000"
    depends_on:
      vllm-emb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 300s
    ipc: host
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AIZK_RERANK_GPU_DEVICE:-0}"]
              capabilities: ["gpu"]

  # The gliner sidecar serves relevance, route classification, query mentions, and optional graph
  # extraction so the server process never imports torch. Its custom DeBERTa multitask architecture
  # has no vLLM serving path, so this is a plain torch FastAPI service from services/gliner. The
  # 340M large checkpoint serves every task on GPU with fp16, FlashDeberta, and optional compiled
  # tensor subgraphs. Dense documents use overlapping long-context extraction.
  gliner:
    build:
      # context is the package root so the image copies the gate and extraction wire models beside
      # services/gliner/app.py. The root .dockerignore keeps the context small.
      context: ..
      dockerfile: services/gliner/Dockerfile
    environment:
      GLINER_DEVICE: ${AIZK_GLINER_DEVICE:-cuda}
      GLINER_CHECKPOINT: ${AIZK_GLINER_CHECKPOINT:-fastino/gliner2-large-v1}
      GLINER_QUANTIZE: ${AIZK_GLINER_QUANTIZE:-true}
      GLINER_COMPILE: ${AIZK_GLINER_COMPILE:-false}
      GLINER_LONG_CHUNK_SIZE: ${AIZK_GLINER_LONG_CHUNK_SIZE:-384}
      GLINER_LONG_CHUNK_OVERLAP: ${AIZK_GLINER_LONG_CHUNK_OVERLAP:-64}
      GLINER_BATCH_SIZE: ${AIZK_GLINER_BATCH_SIZE:-8}
    ports:
      - "127.0.0.1:${AIZK_GLINER_PORT:-8006}:8000"
    depends_on:
      vllm-llm:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 180s
    volumes:
      - ${AIZK_HOME:-${HOME}/.aizk}/hf-cache:/root/.aizk/hf-cache
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${AIZK_GLINER_GPU_DEVICE:-0}"]
              capabilities: ["gpu"]
  # Migrations and queue installation run once before either long-lived process starts. This
  # service carries the database-owner credential and exits before public traffic is accepted.
  setup:
    <<: *aizk-runtime
    command: ["db", "setup"]
    depends_on:
      cloudflared:
        condition: service_healthy
        required: false
      db:
        condition: service_healthy
      logto:
        condition: service_healthy
        required: false
      volume-init:
        condition: service_completed_successfully
    restart: "no"

  # The public process receives only the forced-RLS app credential. Owner maintenance, queue
  # execution, and plaintext backups stay in the private worker below.
  server:
    <<: *aizk-runtime
    depends_on:
      public-check:
        condition: service_completed_successfully
        required: false
      setup:
        condition: service_completed_successfully
      gliner:
        condition: service_healthy
      logto:
        condition: service_healthy
        required: false
    environment:
      <<: *aizk-runtime-environment
      AIZK_ADMIN_DATABASE_URL: ""
      AIZK_ADMIN_PASSWORD: ""
      AIZK_BACKUP_DATABASE_URL: ""
      AIZK_BACKUP_ENABLED: "0"
      AIZK_AUTO_SETUP: "0"
      AIZK_SERVE_WITH_WORKER: "0"
      AIZK_TUNNEL_TOKEN: ""
      AIZK_MCP_HOST: 0.0.0.0
      AIZK_MCP_PORT: "8080"
      FASTMCP_HOME: /oauth
    ports:
      - "127.0.0.1:${AIZK_MCP_PUBLISH_PORT:-8080}:8080"
    volumes:
      - ${AIZK_OAUTH_VOLUME:-oauth}:/oauth

  # The private worker owns privileged maintenance and backups but publishes no port. An exploit
  # in the MCP server therefore cannot obtain the owner connection through its environment.
  worker:
    <<: *aizk-runtime
    command: ["worker"]
    depends_on:
      setup:
        condition: service_completed_successfully
      gliner:
        condition: service_healthy
      logto:
        condition: service_healthy
        required: false
    environment:
      <<: *aizk-runtime-environment
      AIZK_BACKUP_ENABLED: "1"
      AIZK_BACKUP_DIR: /backups
    volumes:
      - ${AIZK_BACKUP_VOLUME:-backups}:/backups

  # Logto remains the identity and organization authority in the optional public deployment.
  logto:
    image: svhd/logto:1.41.0
    profiles: ["public"]
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["sh", "-c", "npm run cli db alt deploy && exec npm start"]
    environment:
      - TRUST_PROXY_HEADER=1
      - DB_URL=postgres://logto:${AIZK_LOGTO_DB_PASSWORD:?set AIZK_LOGTO_DB_PASSWORD}@db:5432/logto
      - ENDPOINT=${AIZK_LOGTO_ENDPOINT:-http://localhost:3001}
      - ADMIN_ENDPOINT=${AIZK_LOGTO_ADMIN_ENDPOINT:-http://localhost:3002}
    ports:
      - "127.0.0.1:${AIZK_LOGTO_PORT:-3001}:3001"
      - "127.0.0.1:${AIZK_LOGTO_ADMIN_PORT:-3002}:3002"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001/oidc/.well-known/openid-configuration').then(r => { if (!r.ok) process.exit(1) })"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  # Reconcile the committed authorization policy through Logto's Management API before the
  # public server starts. The command is idempotent and leaves unrelated roles and permissions
  # alone.
  logto-setup:
    <<: *aizk-runtime
    profiles: ["public"]
    command: ["logto", "apply"]
    depends_on:
      cloudflared:
        condition: service_healthy
      logto:
        condition: service_healthy
    environment:
      <<: *aizk-runtime-environment
      AIZK_REQUIRE_AUTH: "1"
    restart: "no"

  # This one-shot gate makes the public server fail closed when authentication is absent or
  # partial. The shared tunnel must be ready first because it publishes Logto's canonical issuer.
  public-check:
    <<: *aizk-runtime
    profiles: ["public"]
    command: ["check-public"]
    depends_on:
      logto-setup:
        condition: service_completed_successfully
    environment:
      <<: *aizk-runtime-environment
      AIZK_REQUIRE_AUTH: "1"
    restart: "no"

  # The outbound Cloudflare Tunnel publishes Logto and MCP through the public profile. Logto
  # starts first, then the tunnel's native readiness endpoint proves an active Cloudflare
  # connection before any process resolves the canonical public OIDC issuer through it.
  cloudflared:
    image: cloudflare/cloudflared:2026.6.1
    profiles: ["public"]
    command: tunnel --no-autoupdate --metrics 0.0.0.0:2000 run --token ${AIZK_TUNNEL_TOKEN:-}
    depends_on:
      logto:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "cloudflared", "tunnel", "--metrics", "127.0.0.1:2000", "ready"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    restart: unless-stopped

volumes:
  db-data:
  backups:
  oauth:
