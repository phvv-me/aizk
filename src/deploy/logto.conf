# Reproducible, nonsecret Logto authorization policy. AIZK reads this file first and `.env`
# second, so a deployment can override any value without changing committed policy. Credentials,
# application IDs, public URLs, and tunnel tokens belong only in `.env`.
AIZK_LOGTO_API_NAME=AIZK MCP
AIZK_LOGTO_API_TOKEN_SECONDS=3600
AIZK_LOGTO_MANAGED_ROLE_PREFIX=aizk-
AIZK_LOGTO_USER_ROLE=aizk-user
AIZK_LOGTO_USER_ROLE_DESCRIPTION=Access AIZK
AIZK_LOGTO_REQUIRED_SCOPES=["control"]
AIZK_LOGTO_SCOPE_DESCRIPTIONS={"control":"Use AIZK memory through MCP"}
AIZK_LOGTO_ORGANIZATION_ROLES={"admin":"Manage and write shared AIZK memory","editor":"Write shared AIZK memory","viewer":"Read shared AIZK memory"}
AIZK_LOGTO_WRITE_PERMISSION=write:memory
AIZK_LOGTO_ORGANIZATION_PERMISSIONS={"write:memory":"Write shared AIZK memory in an organization","manage:member":"Add members and change their organization roles","delete:member":"Remove members from an organization"}
AIZK_LOGTO_RETIRED_ORGANIZATION_PERMISSIONS=["invite:member"]
AIZK_LOGTO_ROLE_PERMISSIONS={"admin":["write:memory","manage:member","delete:member"],"editor":["write:memory"],"viewer":[]}
AIZK_LOGTO_CREATOR_ROLE=admin
