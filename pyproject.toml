[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "aizk"
version = "0.0.1"
description = "A self-hosted multi-tenant memory engine that turns a Zettelkasten into scoped agent-queryable memory over MCP"
readme = "README.md"
requires-python = ">=3.14"
license = "Apache-2.0"
authors = [{ name = "Pedro Valois", email = "contact@phvv.me" }]
keywords = ["aizk"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.14",
  "Topic :: Software Development :: Libraries",
]
dependencies = [
  "sqlalchemy[asyncio]>=2.1.0b3,<3",
  "sqlmodel>=0.0.39,<0.1",
  "asyncpg>=0.30,<0.32",
  "alembic>=1.14,<2",
  "pgvector>=0.3.6,<0.5",
  "pydantic-settings>=2.5,<3",
  "httpx>=0.28,<0.29",
  "cyclopts>=4,<5",
  "loguru>=0.7.3,<0.8",
  "fastmcp>=2.11,<3",
  "networkx>=3.4,<4",
  "scipy>=1.14,<2",
  "numpy>=2,<3",
  "openai>=1.109,<2",
  "chonkie[code]>=1.6,<2",
  "identify>=2.6,<3",
  "python-slugify>=8.0,<9",
  "inflection>=0.5,<0.6",
  "jinja2>=3.1,<4",
  "jsonlines>=4.0,<5",
  "patos",
  "rlsalchemy",
  "mainboard>=0.0.8",
  "pgqueuer>=0.10,<1",
  "dateparser>=1.2,<2",
  "tenacity>=9,<10",
  "gliner2>=0.1",
]

[project.scripts]
aizk = "aizk.cli:app"

[tool.uv]
override-dependencies = ["sqlalchemy[asyncio]>=2.1.0b3,<3"]

[project.optional-dependencies]
dev = [
  "ruff>=0.6",
  "pyrefly>=1",
  "mypy>=1.11",
  "pytest>=8",
  "hypothesis>=6.100",
  "pytest-cov>=5",
  "syrupy>=4",
  "pytest-subprocess>=1.5",
  "pytest-mock>=3.14",
  "faker>=30",
  "polyfactory>=2.22,<3",
  "dirty-equals>=0.8",
  "ranx>=0.3.20,<0.4",
  "mainboard",
]
docs = ["mkdocs-material>=9.5", "mkdocs-static-i18n>=1.2"]

[project.urls]
Homepage = "https://phvv.me/aizk"
Documentation = "https://phvv.me/aizk"
Repository = "https://github.com/phvv-me/aizk"
Issues = "https://github.com/phvv-me/aizk/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/aizk"]

[tool.ruff]
line-length = 99
target-version = "py314"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.ruff.lint.isort]
known-first-party = ["alembic"]

[tool.pyright]
pythonVersion = "3.14"
typeCheckingMode = "standard"
venvPath = "../../.chefe/.pixi/envs"
venv = "default"
reportMissingModuleSource = false

[tool.pyrefly]
project-includes = ["src", "tests"]
search-path = ["src", "tests", "."]
replace-imports-with-any = ["sqlmodel", "sqlmodel.*", "sqlalchemy", "sqlalchemy.*"]

[tool.mypy]
python_version = "3.14"
strict = true
disallow_any_explicit = true
plugins = ["pydantic.mypy"]
files = ["src"]
mypy_path = "src"
namespace_packages = false

[[tool.mypy.overrides]]
module = "pgvector.*"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = ["aizk.config", "aizk.retrieve"]
disallow_any_explicit = false

[tool.pytest.ini_options]
addopts = "-q -ra --strict-markers --import-mode=importlib --cov=aizk --cov-report=term-missing"
testpaths = ["tests"]
pythonpath = ["tests"]
markers = ["integration: needs the live GPU model services, deselected by default"]

[tool.coverage.run]
source = ["aizk"]
branch = true
omit = ["*/store/migrations/*"]

[tool.coverage.report]
show_missing = true
fail_under = 99
exclude_lines = [
  "pragma: no cover",
  "raise NotImplementedError",
  "if TYPE_CHECKING:",
  "if __name__ == .__main__.:",
  "\\.\\.\\.",
]
