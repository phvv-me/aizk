name: CI

# One manifest, one environment. CI provisions the same chefe/pixi dev env the monorepo uses,
# compiled from the `[tool.chefe]` table in pyproject.toml (plus `[project.dependencies]` and
# `[dependency-groups]`), so a fresh solve reproduces the local gate instead of drifting. A
# separate `uv sync` used to diverge here: a stale `uv.lock` and three missing type stubs left
# 187 pyrefly errors that `chefe run typecheck` never saw. chefe closes that gap by building the
# identical environment, pinning the fast-moving checkers, and routing the house packages to
# their git source (PyPI lags their source at the same version number).
on:
  pull_request:
  workflow_call: # publish.yml runs this exact gate on main before publishing

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      # chefe owns dependencies, environments, and tasks. It installs pixi (the solver it compiles
      # to) on first use, so `uv tool install` is the whole bootstrap; nothing else is set up here.
      - name: install chefe
        run: |
          uv tool install "chefe>=0.0.25"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: cache the pixi binary and solved packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pixi
            ~/.cache/rattler
            .chefe/.pixi
          key: chefe-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      - run: chefe install
      - run: chefe run lint
      - run: chefe run lint-imports
      - run: chefe run typecheck
      - run: chefe run infra-check

  # The suite is hermetic above the database seam (every model endpoint is faked), but the
  # database itself is real: the same VectorChord image the compose file ships, on the same host
  # port, with the same restricted app role initdb/roles.sh creates, so forced row level security
  # is exercised exactly as in production. macOS carries no service containers, so tests are a
  # Linux job; cross-platform parity is a v1 roadmap item.
  test:
    runs-on: ubuntu-latest
    # the suite builds its DSNs from these; in production they come from .env, which CI has no
    # copy of, so pass the service-container admin password and the bootstrapped app-role password
    env:
      AIZK_ADMIN_PASSWORD: aizk
      AIZK_APP_PASSWORD: aizk_app
    services:
      db:
        image: tensorchord/vchord-suite:pg18-latest
        env:
          POSTGRES_USER: aizk_admin
          POSTGRES_PASSWORD: aizk
          POSTGRES_DB: aizk
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U aizk_admin"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 12
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
      - name: install chefe
        run: |
          uv tool install "chefe>=0.0.25"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: cache the pixi binary and solved packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pixi
            ~/.cache/rattler
            .chefe/.pixi
          key: chefe-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
      # the role bootstrap initdb/roles.sh performs against a compose volume; a service container
      # cannot mount repo files, so the same statements run here over the wire
      - name: bootstrap app role
        run: |
          PGPASSWORD=aizk psql -h localhost -p 5433 -U aizk_admin -d aizk -v ON_ERROR_STOP=1 <<'SQL'
          CREATE ROLE aizk_app LOGIN PASSWORD 'aizk_app' NOSUPERUSER NOBYPASSRLS NOCREATEDB NOCREATEROLE;
          GRANT USAGE ON SCHEMA public TO aizk_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT SELECT, INSERT, UPDATE, DELETE ON TABLES TO aizk_app;
          ALTER DEFAULT PRIVILEGES IN SCHEMA public
            GRANT USAGE, SELECT ON SEQUENCES TO aizk_app;
          SQL
      - run: chefe install
      # `chefe run test` runs the two-pass coverage union: the default sysmon core cannot emit one
      # async-with enter arc (graph/build.py retry loop), so that single test re-runs under the
      # pytrace core and appends before the 100% gate is enforced on the union.
      - run: chefe run test
