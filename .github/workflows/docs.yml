name: Docs

# Builds the Astro site, which is the landing page and the documentation together, and runs the
# page gate over it. The site is served from the deployment itself through the `docs` Compose
# service, so this job publishes nothing. It only proves the build is green and the pages obey
# the reading budget, the diagram rule and the internal link rule.
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/docs.yml", "README.md"]
  pull_request:
    paths: ["docs/**", ".github/workflows/docs.yml", "README.md"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v6
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: pnpm --dir docs install --frozen-lockfile
      - run: pnpm --dir docs check
      - run: pnpm --dir docs build
