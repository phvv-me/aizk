name: Docs

# Builds the Astro + Starlight docs site and deploys it to GitHub Pages on main when docs change.
# The site is static and imports no project code, so this job never touches Python, chefe, or the
# runtime dependencies.
on:
  push:
    branches: [main]
    paths: ["docs/**", ".github/workflows/docs.yml", "README.md"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs/pnpm-lock.yaml
      - run: pnpm --dir docs install --frozen-lockfile
      - run: pnpm --dir docs build
      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
